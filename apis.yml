aid: werf
name: Werf
description: >-
  Werf is an open-source CNCF sandbox project providing a complete GitOps-based
  CI/CD solution for Kubernetes. It implements the full application delivery
  lifecycle — building images, managing dependencies, deploying Helm charts, and
  cleaning up container registries — using Git as the single source of truth
  (Giterminism). Werf integrates natively with all major CI systems, Buildah,
  Helm, and Kubernetes.
