  - type: Features
    data:
      - name: Giterminism
        description: >-
          Uses Git as the single source of truth, ensuring all CI/CD
          configurations are reproducible and auditable from version control.
      - name: Incremental Builds
        description: >-
          Rebuilds only modified components and reuses existing container
          registry layers, dramatically reducing build times.
      - name: Kubernetes Deployment
        description: >-
          Manages Helm chart deployments to Kubernetes with built-in rollback,
          planning, and drift detection (werf converge, werf plan, werf rollback).
      - name: Container Registry Cleanup
        description: >-
          Automatically cleans up stale images from container registries using
          Git history-aware policies (werf cleanup, werf purge).
      - name: Helm Integration
        description: >-
          Full Helm chart management including rendering, linting, bundling,
          and deploying with werf helm command suite.
      - name: Multi-CI Support
        description: >-
          Native integration with GitHub Actions, GitLab CI, CircleCI, Jenkins,
          and other CI systems via werf ci-env.
      - name: Secure Software Delivery
        description: >-
          TRDL component provides TUF-based secure software update distribution
          with GPG signature verification.
  - type: UseCases
    data:
      - name: Kubernetes Application Delivery
        description: >-
          Build, test, and deploy containerized applications to Kubernetes
          clusters using GitOps principles.
      - name: Monorepo CI/CD
        description: >-
          Manage CI/CD pipelines for monorepo projects with independent image
          tagging and selective component redeployment.
      - name: Helm Chart Management
        description: >-
          Package, bundle, and deploy Helm charts with integrated dependency
          management and Kubernetes compatibility checks.
      - name: Container Registry Management
        description: >-
          Automate container image lifecycle from build to cleanup using
          content-based tagging and Git-aware retention policies.
      - name: Secure Software Distribution
        description: >-
          Distribute software updates securely using TUF framework with TRDL,
          ensuring integrity and authenticity of delivered artifacts.
  - type: Integrations
    data:
      - name: GitHub Actions
        description: >-
          Native GitHub Actions for incorporating werf into GitHub-hosted
          CI/CD pipelines.
      - name: GitLab CI
        description: >-
          First-class support for GitLab CI/CD environment variables and
          pipeline integration.
      - name: Helm
        description: >-
          Deep integration with Helm package manager for Kubernetes, extending
          it with werf-specific deployment guarantees.
      - name: Buildah
        description: >-
          Uses Buildah for rootless, daemonless OCI image builds without
          requiring Docker.
      - name: Kubernetes
        description: >-
          Direct integration with Kubernetes API for deploying, monitoring,
          and managing application resources.
      - name: OCI Registries
        description: >-
          Compatible with all OCI-compliant container registries including
          Docker Hub, GHCR, GitLab Registry, and cloud registries.
      - name: CNCF Ecosystem
        description: >-
          CNCF Sandbox project integrating with the broader cloud-native
          ecosystem including Flux CD and other CNCF tools.
